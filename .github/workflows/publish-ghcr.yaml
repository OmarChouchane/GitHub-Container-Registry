name: Docker Image CI for GHCR

on:
  push

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v3

      - name: Build and push the image
        run: |
          docker login --username omarchouchane --password ${{ secrets.GHCR_TOKEN }} ghcr.io
          docker build -t ghcr.io/omarchouchane/hello-world:latest .
          docker push ghcr.io/omarchouchane/hello-world:latest
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
